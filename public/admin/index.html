<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Content Manager</title>
  </head>
  <body>
    <!-- Load Netlify CMS first -->
    <script src="https://unpkg.com/netlify-cms-app@^2.0.0/dist/netlify-cms.js"></script>

    <!-- Then initialize CMS -->
    <script>
      // Initialize Netlify CMS with config.yml in the same folder
      window.CMS && CMS.init({
        config: 'config.yml'
      });
    </script>
  </body>
</html>
